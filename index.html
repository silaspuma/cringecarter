<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coming soon</title>
    <style>
        /* Basic Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Pure white background */
            overflow: hidden; /* Prevents scrolling */
        }

        .container {
            text-align: center;
        }

        img {
            max-width: 80%; /* Ensures it doesn't touch the edges on mobile */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="comingsoon.png" alt="coming soon">
    </div>

</body>
</html>
